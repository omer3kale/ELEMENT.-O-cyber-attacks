name: CI

"on": [push, pull_request]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check workspace
        run: php bin/check-workspace.php

      - name: Run ProcessableItems tests
        run: ./vendor/bin/phpunit --testsuite ProcessableItems

      - name: Run SecurityTasks tests
        run: ./vendor/bin/phpunit --testsuite SecurityTasks
