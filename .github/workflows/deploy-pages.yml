name: Deploy to GitHub Pages

"on":
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check workspace
        run: php bin/check-workspace.php

      - name: Build static site
        run: php bin/build-static-site.php

      - name: Assemble site directory
        run: |
          # Create the unified Pages root
          mkdir -p site/catalog

          # Copy the /docs documentation site into /site
          cp -r docs/. site/

          # Move the generated attack catalog under /site/catalog/
          cp dist/index.html   site/catalog/index.html
          cp dist/manifest.json site/catalog/manifest.json 2>/dev/null || true
          cp dist/sw.js         site/catalog/sw.js          2>/dev/null || true
          cp -r dist/icons      site/catalog/               2>/dev/null || true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
